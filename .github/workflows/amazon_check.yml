name: Amazon Monitor

on:
  schedule:
    # 6分ごとに自動実行
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリをインストール
      run: pip install requests beautifulsoup4

    - name: スクリプトを実行
      env:
        # ここで3つの秘密の部屋（トークン、COOKIE_A、COOKIE_B）をすべてプログラムに引き渡します
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        COOKIE_A: ${{ secrets.COOKIE_A }}
        COOKIE_B: ${{ secrets.COOKIE_B }}
      run: python monitor.py
