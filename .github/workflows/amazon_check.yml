name: Amazon Monitor

on:
  schedule:
    # 5分ごとに自動実行する設定（GitHubの混雑状況により多少遅れることがあります）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動でいつでも実行できるボタンを追加

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリをインストール
      run: |
        pip install requests beautifulsoup4

    # 一番最後の行
    - name: スクリプトを実行
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python app.py  # ← ここを app.py に変更します
